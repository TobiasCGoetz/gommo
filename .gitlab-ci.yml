cache:
  paths:
    - .cache

stages:
  - test
  - build

before_script:
  - mkdir -p .cache
  - export GOPATH="$CI_PROJECT_DIR/.cache"
  - go get gommo

test:
  stage: test
  tags:
    - shell
  script:
    - make test

build:
  stage: build
  tags:
    - shell
  script:
    - make buildarm
  only:
  - master
